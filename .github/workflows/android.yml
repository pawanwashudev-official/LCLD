name: Build and Release LCLD APK

on:
  push:
    branches:
      - '**' # Triggers on push to any branch
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Generate Dummy Keystore
      run: |
        keytool -genkey -v -keystore dummy.keystore -alias dummy -keyalg RSA -keysize 2048 -validity 10000 -storepass dummy123 -keypass dummy123 -dname "CN=Dummy, OU=Dummy, O=Dummy, L=Dummy, S=Dummy, C=US"
        echo "storeFile=../dummy.keystore" > keystore.properties
        echo "storePassword=dummy123" >> keystore.properties
        echo "keyAlias=dummy" >> keystore.properties
        echo "keyPassword=dummy123" >> keystore.properties

    - name: Build Release APK
      run: ./gradlew assembleProdRelease -Pandroid.injected.signing.store.file=$(pwd)/dummy.keystore -Pandroid.injected.signing.store.password=dummy123 -Pandroid.injected.signing.key.alias=dummy -Pandroid.injected.signing.key.password=dummy123

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LCLD-Release-APK
        path: app/build/outputs/apk/prod/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK from build job
        uses: actions/download-artifact@v4
        with:
          name: LCLD-Release-APK

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.0-${{ github.sha }}"
          name: "LCLD Release v1.0.0-${{ github.sha }}"
          files: |
            *.apk
          generate_release_notes: true
